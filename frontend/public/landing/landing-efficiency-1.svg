<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Clock body -->
  <circle cx="60" cy="60" r="48" stroke="#3C4514" stroke-width="4" fill="none"/>
  <!-- Clock center dot -->
  <circle cx="60" cy="60" r="4" fill="#3C4514"/>
  <!-- Hour hand (pointing ~2 o'clock) -->
  <line x1="60" y1="60" x2="78" y2="40" stroke="#3C4514" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~10, fast motion) -->
  <line x1="60" y1="60" x2="36" y2="32" stroke="#3C4514" stroke-width="3" stroke-linecap="round"/>
  <!-- Speed lines (motion effect on the right) -->
  <line x1="112" y1="38" x2="98" y2="38" stroke="#3C4514" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="116" y1="50" x2="100" y2="50" stroke="#3C4514" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="118" y1="62" x2="102" y2="62" stroke="#3C4514" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Hour markers -->
  <line x1="60" y1="16" x2="60" y2="22" stroke="#3C4514" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="98" x2="60" y2="104" stroke="#3C4514" stroke-width="3" stroke-linecap="round"/>
  <line x1="16" y1="60" x2="22" y2="60" stroke="#3C4514" stroke-width="3" stroke-linecap="round"/>
  <line x1="98" y1="60" x2="104" y2="60" stroke="#3C4514" stroke-width="3" stroke-linecap="round"/>
  <!-- Small lightning bolt for "fast" -->
  <polygon points="88,8 80,22 86,22 78,36 92,20 86,20" fill="#3C4514" opacity="0.85"/>
</svg>
